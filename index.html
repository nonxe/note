<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Dark Notes</title>
    <style>
        /* iOS Dark Theme Constants */
        :root {
            --bg-color: #000000;
            --surface-color: #1c1c1e;
            --surface-color-active: #2c2c2e;
            --text-primary: #ffffff;
            --text-secondary: #ebebf599;
            --accent-color: #0a84ff;
            --danger-color: #ff453a;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            line-height: 1.5;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header / Nav */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 30px 0;
        }

        h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .btn-text {
            color: var(--accent-color);
            background: none;
            border: none;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-text:active {
            opacity: 0.7;
        }

        /* Editor View */
        #editor-view {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: calc(100vh - 120px);
        }

        input[type="text"], textarea {
            background-color: var(--surface-color);
            color: var(--text-primary);
            border: none;
            border-radius: 10px;
            padding: 16px;
            font-size: 17px;
            font-family: inherit;
            outline: none;
            transition: background-color 0.2s;
        }

        input[type="text"]:focus, textarea:focus {
            background-color: var(--surface-color-active);
        }

        input[type="text"]::placeholder, textarea::placeholder {
            color: var(--text-secondary);
        }

        textarea {
            flex-grow: 1;
            resize: none;
        }

        /* Reader View */
        #reader-view {
            display: none;
            padding-bottom: 50px;
        }

        #reader-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        #reader-meta {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #38383a;
        }

        #reader-content {
            font-size: 17px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        #reader-content p {
            margin-bottom: 15px;
        }

        /* Loading Overlay */
        #loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--surface-color-active);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Modal for Link */
        #link-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface-color);
            padding: 25px;
            border-radius: 14px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            z-index: 101;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #link-modal h3 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        #generated-link {
            background: #000;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 14px;
            word-break: break-all;
            color: var(--accent-color);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-primary {
            flex: 1;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-secondary {
            flex: 1;
            background: var(--surface-color-active);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="app-title">Notes</h1>
        <button id="action-btn" class="btn-text">Save</button>
    </header>

    <main id="editor-view">
        <input type="text" id="note-title" placeholder="Title" autocomplete="off">
        <textarea id="note-content" placeholder="Start typing..."></textarea>
    </main>

    <main id="reader-view">
        <div id="reader-title"></div>
        <div id="reader-meta"></div>
        <div id="reader-content"></div>
    </main>

    <div id="loading"><div class="spinner"></div></div>

    <div id="link-modal">
        <h3>Note Published!</h3>
        <p style="color: var(--text-secondary); font-size: 15px;">Your note is saved permanently. Share this link:</p>
        <div id="generated-link"></div>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="closeModal()">Close</button>
            <button class="btn-primary" onclick="copyLink()">Copy Link</button>
        </div>
    </div>

    <script>
        // DOM Elements
        const editorView = document.getElementById('editor-view');
        const readerView = document.getElementById('reader-view');
        const appTitle = document.getElementById('app-title');
        const actionBtn = document.getElementById('action-btn');
        const noteTitleInput = document.getElementById('note-title');
        const noteContentInput = document.getElementById('note-content');
        const loading = document.getElementById('loading');
        const linkModal = document.getElementById('link-modal');
        const generatedLinkEl = document.getElementById('generated-link');

        // State
        let currentLinkToCopy = '';

        // API Helpers
        async function getTelegraphToken() {
            let token = localStorage.getItem('tg_token');
            if (!token) {
                const res = await fetch('https://api.telegra.ph/createAccount?short_name=iOSNotes&author_name=Anonymous');
                const data = await res.json();
                if (data.ok) {
                    token = data.result.access_token;
                    localStorage.setItem('tg_token', token);
                } else {
                    alert('Error connecting to servers.');
                }
            }
            return token;
        }

        // Convert simple text into Telegraph Node JSON format
        function textToTelegraphNodes(text) {
            return text.split('\n').map(line => {
                return { tag: 'p', children: [line || ' '] };
            });
        }

        // Convert Telegraph Nodes back to HTML for viewing
        function nodesToHtml(nodes) {
            if (!nodes) return '';
            if (typeof nodes === 'string') return nodes;
            
            let html = '';
            nodes.forEach(node => {
                if (typeof node === 'string') {
                    html += node;
                } else if (node.tag) {
                    html += `<${node.tag}>${nodesToHtml(node.children)}</${node.tag}>`;
                }
            });
            return html;
        }

        // Publish to Telegraph
        async function publishNote() {
            const title = noteTitleInput.value.trim() || 'Untitled Note';
            const contentText = noteContentInput.value.trim();

            if (!contentText) {
                alert('Please write something in your note.');
                return;
            }

            loading.style.display = 'flex';

            try {
                const token = await getTelegraphToken();
                const contentNodes = textToTelegraphNodes(contentText);

                const response = await fetch('https://api.telegra.ph/createPage', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        access_token: token,
                        title: title,
                        content: contentNodes,
                        return_content: true
                    })
                });

                const data = await response.json();
                loading.style.display = 'none';

                if (data.ok) {
                    // Generate local URL using hash
                    const currentUrl = window.location.origin + window.location.pathname;
                    const finalUrl = `${currentUrl}#${data.result.path}`;
                    
                    currentLinkToCopy = finalUrl;
                    generatedLinkEl.innerText = finalUrl;
                    linkModal.style.display = 'block';

                    // Clear editor
                    noteTitleInput.value = '';
                    noteContentInput.value = '';
                } else {
                    alert('Failed to save note: ' + data.error);
                }
            } catch (error) {
                loading.style.display = 'none';
                alert('Error: ' + error.message);
            }
        }

        // Fetch Note from Telegraph
        async function loadNoteFromPath(path) {
            loading.style.display = 'flex';
            try {
                const response = await fetch(`https://api.telegra.ph/getPage/${path}?return_content=true`);
                const data = await response.json();
                
                loading.style.display = 'none';

                if (data.ok) {
                    // Switch to Reader View
                    editorView.style.display = 'none';
                    readerView.style.display = 'block';
                    
                    appTitle.innerText = 'Viewing Note';
                    actionBtn.innerText = 'New Note';
                    actionBtn.onclick = () => {
                        window.location.hash = '';
                        window.location.reload();
                    };

                    document.getElementById('reader-title').innerText = data.result.title;
                    
                    // Format date nicely
                    const date = new Date(data.result.views * 0); // Telegraph doesn't send creation date in getPage, but we can just show static or omit. We will omit views to keep it clean.
                    document.getElementById('reader-meta').innerText = `Read-only View • via Telegra.ph API`;
                    
                    document.getElementById('reader-content').innerHTML = nodesToHtml(data.result.content);
                } else {
                    alert('Note not found or has been removed.');
                    window.location.hash = '';
                    window.location.reload();
                }
            } catch (error) {
                loading.style.display = 'none';
                alert('Error loading note.');
            }
        }

        // Modal Controls
        function closeModal() {
            linkModal.style.display = 'none';
        }

        function copyLink() {
            navigator.clipboard.writeText(currentLinkToCopy).then(() => {
                const btn = document.querySelector('.btn-primary');
                btn.innerText = 'Copied!';
                btn.style.background = '#32d74b'; // iOS Green
                setTimeout(() => {
                    btn.innerText = 'Copy Link';
                    btn.style.background = 'var(--accent-color)';
                }, 2000);
            });
        }

        // Router Init
        function initApp() {
            // Check if there's a hash in the URL (e.g. #My-Note-Title-06-09)
            const hash = window.location.hash.substring(1); 
            
            if (hash) {
                // We are reading a note
                loadNoteFromPath(hash);
            } else {
                // We are writing a note
                editorView.style.display = 'flex';
                readerView.style.display = 'none';
                actionBtn.onclick = publishNote;
            }
        }

        // Listen for hash changes (if user clicks back button)
        window.addEventListener('hashchange', () => {
            window.location.reload();
        });

        // Start
        initApp();
    </script>
</body>
</html>
