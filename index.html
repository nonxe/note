<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>host your Notes</title>
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #1c1c1e;
            --surface-color-active: #2c2c2e;
            --text-primary: #ffffff;
            --text-secondary: #ebebf599;
            --accent-color: #0a84ff;
            --danger-color: #ff453a;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --transition-spring: 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            line-height: 1.5;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* Subtle initial fade in */
            animation: pageFadeIn 0.4s ease-out;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body.page-fade-out {
            animation: pageFadeOut 0.25s ease-in forwards;
        }

        @keyframes pageFadeOut {
            to { opacity: 0; transform: translateY(-5px); }
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 30px 0;
            flex-shrink: 0;
        }

        h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
            transition: transform 0.2s;
        }

        .btn-text {
            color: var(--accent-color);
            background: none;
            border: none;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s;
            will-change: transform;
            position: relative;
            outline: none;
        }

        .btn-text:active {
            transform: scale(0.92);
            opacity: 0.7;
        }

        /* View container – occupies all remaining space */
        .view-container {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        #editor-view,
        #reader-view {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px) scale(0.98);
            transition: opacity 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        visibility 0.35s;
            will-change: transform, opacity;
        }

        #editor-view.active,
        #reader-view.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
            position: relative; /* for scroll */
        }

        #editor-view {
            gap: 18px;
        }

        /* Inputs – larger & comfortable */
        input[type="text"] {
            background-color: var(--surface-color);
            color: var(--text-primary);
            border: none;
            border-radius: 12px;
            padding: 18px 20px;
            font-size: 19px;
            font-family: inherit;
            outline: none;
            transition: background-color 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        textarea {
            background-color: var(--surface-color);
            color: var(--text-primary);
            border: none;
            border-radius: 12px;
            padding: 20px;
            font-size: 18px;
            line-height: 1.6;
            font-family: inherit;
            outline: none;
            transition: background-color 0.2s, box-shadow 0.2s;
            flex: 1;
            resize: none;
            /* iOS-style comfortable reading */
            letter-spacing: -0.2px;
        }

        input[type="text"]:focus,
        textarea:focus {
            background-color: var(--surface-color-active);
            box-shadow: 0 0 0 2px var(--accent-color);
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: var(--text-secondary);
        }

        /* Reader view */
        #reader-view {
            padding-bottom: 60px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #reader-title {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        #reader-meta {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid #38383a;
        }

        #reader-content {
            font-size: 18px;
            line-height: 1.65;
            white-space: pre-wrap;
        }

        #reader-content p {
            margin-bottom: 16px;
        }

        /* Loading Overlay */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s, visibility 0.25s;
        }

        #loading.visible {
            opacity: 1;
            visibility: visible;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Modal – smooth spring appearance */
        #link-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            background: var(--surface-color);
            padding: 28px 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            z-index: 101;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            opacity: 0;
            visibility: hidden;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                        opacity 0.3s ease-out,
                        visibility 0.3s;
        }

        #link-modal.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        #link-modal h3 {
            margin-bottom: 12px;
            font-size: 22px;
            font-weight: 600;
        }

        #link-modal p {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 8px;
        }

        #generated-link {
            background: #000;
            padding: 12px;
            border-radius: 10px;
            margin: 18px 0;
            font-size: 14px;
            word-break: break-all;
            color: var(--accent-color);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 22px;
        }

        .btn-primary,
        .btn-secondary {
            flex: 1;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1),
                        background 0.2s;
            will-change: transform;
            color: white;
        }

        .btn-primary {
            background: var(--accent-color);
        }

        .btn-primary:active,
        .btn-secondary:active {
            transform: scale(0.94);
        }

        .btn-secondary {
            background: var(--surface-color-active);
        }

        .btn-primary.copied {
            background: #32d74b;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="app-title">Notes</h1>
        <button id="action-btn" class="btn-text">Save</button>
    </header>

    <div class="view-container">
        <main id="editor-view" class="active">
            <input type="text" id="note-title" placeholder="Title" autocomplete="off">
            <textarea id="note-content" placeholder="Start typing…"></textarea>
        </main>

        <main id="reader-view">
            <div id="reader-title"></div>
            <div id="reader-meta"></div>
            <div id="reader-content"></div>
        </main>
    </div>

    <div id="loading"><div class="spinner"></div></div>

    <div id="link-modal">
        <h3>Note Published!</h3>
        <p>Your note is saved permanently.<br>Share this link:</p>
        <div id="generated-link"></div>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="closeModal()">Close</button>
            <button class="btn-primary" id="copy-btn" onclick="copyLink()">Copy Link</button>
        </div>
    </div>

    <script>
        // ---------- DOM references ----------
        const body = document.body;
        const editorView = document.getElementById('editor-view');
        const readerView = document.getElementById('reader-view');
        const appTitle = document.getElementById('app-title');
        const actionBtn = document.getElementById('action-btn');
        const noteTitleInput = document.getElementById('note-title');
        const noteContentInput = document.getElementById('note-content');
        const loadingOverlay = document.getElementById('loading');
        const linkModal = document.getElementById('link-modal');
        const generatedLinkEl = document.getElementById('generated-link');
        const copyBtn = document.getElementById('copy-btn');
        let currentLinkToCopy = '';

        // ---------- Loading helpers ----------
        function showLoading() {
            loadingOverlay.classList.add('visible');
        }
        function hideLoading() {
            loadingOverlay.classList.remove('visible');
        }

        // ---------- View switching with smooth crossfade ----------
        function showEditor() {
            readerView.classList.remove('active');
            editorView.classList.add('active');
            appTitle.innerText = 'Notes';
            actionBtn.innerText = 'Save';
            actionBtn.onclick = publishNote;
            noteTitleInput.value = '';
            noteContentInput.value = '';
            // Focus the content area for instant typing
            setTimeout(() => noteContentInput.focus(), 100);
        }

        function showReader(title, metaText, contentHtml) {
            editorView.classList.remove('active');
            readerView.classList.add('active');
            appTitle.innerText = 'Viewing Note';
            actionBtn.innerText = 'New Note';
            actionBtn.onclick = () => {
                body.classList.add('page-fade-out');
                setTimeout(() => {
                    window.location.hash = '';
                    window.location.reload();
                }, 260);
            };
            document.getElementById('reader-title').innerText = title;
            document.getElementById('reader-meta').innerText = metaText;
            document.getElementById('reader-content').innerHTML = contentHtml;
        }

        // ---------- Telegraph API (unchanged core) ----------
        async function getTelegraphToken() {
            let token = localStorage.getItem('tg_token');
            if (!token) {
                try {
                    const res = await fetch('https://api.telegra.ph/createAccount?short_name=iOSNotes&author_name=Anonymous');
                    const data = await res.json();
                    if (data.ok) {
                        token = data.result.access_token;
                        localStorage.setItem('tg_token', token);
                    }
                } catch (e) {
                    console.error("Token creation failed, trying fallback...", e);
                }
            }
            return token || 'b968da50dcdb253c9e04a36e35ac26f5619621f6a13d1a52c3c4314c13a0';
        }

        function textToTelegraphNodes(text) {
            return text.split('\n').map(line => ({
                tag: 'p',
                children: [line || ' ']
            }));
        }

        function nodesToHtml(nodes) {
            if (!nodes) return '';
            if (typeof nodes === 'string') return nodes;
            let html = '';
            nodes.forEach(node => {
                if (typeof node === 'string') {
                    html += node;
                } else if (node.tag) {
                    html += `<${node.tag}>${nodesToHtml(node.children)}</${node.tag}>`;
                }
            });
            return html;
        }

        async function publishNote() {
            const title = noteTitleInput.value.trim() || 'Untitled Note';
            const contentText = noteContentInput.value.trim();
            if (!contentText) {
                alert('Please write something in your note.');
                return;
            }

            showLoading();
            try {
                const token = await getTelegraphToken();
                const contentNodes = textToTelegraphNodes(contentText);

                const formData = new URLSearchParams();
                formData.append('access_token', token);
                formData.append('title', title);
                formData.append('content', JSON.stringify(contentNodes));
                formData.append('return_content', 'true');

                const response = await fetch('https://api.telegra.ph/createPage', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                hideLoading();

                if (data.ok) {
                    const currentUrl = window.location.origin + window.location.pathname;
                    const finalUrl = `${currentUrl}#${data.result.path}`;
                    currentLinkToCopy = finalUrl;
                    generatedLinkEl.innerText = finalUrl;
                    openModal();
                    noteTitleInput.value = '';
                    noteContentInput.value = '';
                } else {
                    alert('Failed to save note: ' + data.error);
                }
            } catch (error) {
                hideLoading();
                alert('Error: ' + error.message);
            }
        }

        async function loadNoteFromPath(path) {
            showLoading();
            try {
                const response = await fetch(`https://api.telegra.ph/getPage/${path}?return_content=true`);
                const data = await response.json();
                hideLoading();

                if (data.ok) {
                    showReader(
                        data.result.title,
                        'Read-only View • via AS CLOUD-Server 8',
                        nodesToHtml(data.result.content)
                    );
                } else {
                    alert('Note not found or has been removed.');
                    body.classList.add('page-fade-out');
                    setTimeout(() => {
                        window.location.hash = '';
                        window.location.reload();
                    }, 260);
                }
            } catch (error) {
                hideLoading();
                alert('Error loading note.');
            }
        }

        // ---------- Modal with smooth spring ----------
        function openModal() {
            linkModal.classList.add('show');
        }

        function closeModal() {
            linkModal.classList.remove('show');
            resetCopyButton();
        }

        function resetCopyButton() {
            copyBtn.innerText = 'Copy Link';
            copyBtn.classList.remove('copied');
        }

        function copyLink() {
            navigator.clipboard.writeText(currentLinkToCopy).then(() => {
                copyBtn.innerText = 'Copied!';
                copyBtn.classList.add('copied');
                setTimeout(resetCopyButton, 2000);
            });
        }

        // ---------- Initialization ----------
        function initApp() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                // Start with editor hidden, reader will be activated by load
                editorView.classList.remove('active');
                readerView.classList.remove('active');
                loadNoteFromPath(hash);
            } else {
                showEditor();
            }
        }

        window.addEventListener('hashchange', () => {
            body.classList.add('page-fade-out');
            setTimeout(() => {
                window.location.reload();
            }, 260);
        });

        initApp();
    </script>
</body>
</html>
